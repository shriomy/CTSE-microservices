spring.application.name=order-service

# Server Port
server.port=8082

# Correct JDBC URL format
spring.datasource.url=jdbc:postgresql://ep-curly-base-a8rzjasw-pooler.eastus2.azure.neon.tech:5432/neondb?sslmode=require

# Correct username and password
spring.datasource.username=neondb_owner
spring.datasource.password=npg_RIPTxsdr6a8j

# HikariCP settings
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Swagger UI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
spring.jpa.properties.hibernate.format_sql=true

# Additional SSL configuration for Neon
spring.datasource.hikari.data-source-properties.sslmode=require

# Stripe Configuration
stripe.api.key=${STRIPE_API_KEY:sk_test_your_test_key_here}

# Frontend URL for Stripe redirect
app.frontend.url=${FRONTEND_URL}

# Inter-service Communication
cart-service.url=${CART_SERVICE_URL}


# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Logging
logging.level.com.stationery.order_service=DEBUG
logging.level.org.springframework.security=DEBUG

# Actuator endpoints for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always